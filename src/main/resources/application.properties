# 1. The URL (XAMPP uses 3306 by default)
# Replace 'mallya_supermarket' with your actual database name
spring.config.import=optional:classpath:application-local.properties
spring.datasource.url=jdbc:mysql://localhost:3307/mallya_supermarket?useSSL=false&serverTimezone=UTC

# 2. XAMPP Default Credentials
# By default, XAMPP uses 'root' with NO password
spring.datasource.username=root
spring.datasource.password=

# 3. Driver and Hibernate Settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# AzamPay Sandbox configuration
# Keep these values in environment variables in production.
payment.azampay.enabled=true
payment.azampay.auth-base-url=https://authenticator-sandbox.azampay.co.tz
payment.azampay.checkout-base-url=https://sandbox.azampay.co.tz
payment.azampay.app-name=Mallya Supermarket System
payment.azampay.default-currency=TZS
payment.azampay.timeout-seconds=15
payment.azampay.connect-timeout-seconds=30

payment.azampay.request-timeout-seconds=60
