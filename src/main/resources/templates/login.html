<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallya Supermarket - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .home-topbar {
            background: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }

        .home-topbar-inner {
            max-width: 1100px;
            margin: auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .home-topbar-logo {
            background: #0d6efd;
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 700;
            text-decoration: none;
            line-height: 1;
        }

        .home-topbar-links a {
            margin-left: 16px;
            color: #6b6b6b;
            text-decoration: none;
            font-weight: 500;
        }

        .home-topbar-links a:hover {
            color: #1f1f1f;
        }
        :root {
            --bg-start: #f4efe6;
            --bg-end: #fef8f1;
            --panel: #ffffff;
            --ink: #1f2933;
            --muted: #52606d;
            --brand: #0f766e;
            --brand-dark: #0d5e58;
            --accent: #f59e0b;
            --danger-bg: #fee2e2;
            --danger-text: #9b1c1c;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --line: #e5e7eb;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Poppins", "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 85% 10%, rgba(245, 158, 11, 0.35) 0%, transparent 30%),
                radial-gradient(circle at 10% 90%, rgba(15, 118, 110, 0.25) 0%, transparent 35%),
                linear-gradient(140deg, var(--bg-start), var(--bg-end));
            margin: 0;
        }

        .login-page-wrap {
            min-height: calc(100vh - 58px);
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--panel);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: slide-in 0.45s ease-out;
        }

        .banner {
            padding: 1.25rem 1.5rem;
            background: linear-gradient(120deg, var(--brand), #0f4f76);
            color: #fff;
        }

        .banner h1 {
            font-size: 1.35rem;
            font-weight: 600;
        }

        .banner p {
            margin-top: 0.25rem;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .body {
            padding: 1.5rem;
        }

        .alert {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .alert-error {
            background: var(--danger-bg);
            color: var(--danger-text);
            border-color: #fca5a5;
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: #86efac;
        }

        .field {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.45rem;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 0.75rem 0.85rem;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 0.82rem 0.9rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            background: linear-gradient(120deg, var(--brand), var(--brand-dark));
            cursor: pointer;
            transition: transform 0.16s ease, filter 0.16s ease;
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .seeded-note {
            margin-top: 1rem;
            padding: 0.9rem;
            border-radius: 10px;
            border: 1px dashed #d4d4d8;
            background: #fafafa;
            font-size: 0.84rem;
            color: #3f3f46;
            line-height: 1.4;
        }

        .seeded-note strong {
            color: #111827;
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<header class="home-topbar">
    <div class="home-topbar-inner">
        <a class="home-topbar-logo" href="/">MALLYA</a>
        <nav class="home-topbar-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </nav>
    </div>
</header>

<div class="login-page-wrap">
    <div class="login-card">
        <div class="banner">
            <h1>Mallya Supermarket</h1>
            <p>Sign in to access dashboard and POS operations.</p>
        </div>
        <div class="body">
            <div class="alert alert-error" th:if="${param.error}">
                Invalid username or password.
            </div>
            <div class="alert alert-success" th:if="${param.logout}">
                You have been logged out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required autofocus>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button class="btn" type="submit">Login</button>
            </form>

        </div>
    </div>
</div>
</body>
</html>
