<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .home-topbar {
            background: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }

        .home-topbar-inner {
            max-width: 1100px;
            margin: auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .home-topbar-logo {
            background: #0d6efd;
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 700;
            text-decoration: none;
            line-height: 1;
        }

        .home-topbar-links a {
            margin-left: 16px;
            color: #6b6b6b;
            text-decoration: none;
            font-weight: 500;
        }

        .home-topbar-links a:hover {
            color: #1f1f1f;
        }
        body { background: #f4f6fa; }
        .nav-link.active {
            font-weight: 600;
            color: #fff !important;
            text-decoration: underline;
            text-underline-offset: 0.35rem;
        }
        .qty-input { max-width: 85px; }
    </style>
</head>
<body>
<header class="home-topbar">
    <div class="home-topbar-inner">
        <a class="home-topbar-logo" href="/">MALLYA</a>
        <nav class="home-topbar-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </nav>
    </div>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-lg-4">
        <a class="navbar-brand fw-semibold" href="/cashier/dashboard">
            <i class="bi bi-cart-check me-2"></i>Cashier POS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#cashierNav" aria-controls="cashierNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="cashierNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'dashboard'} ? ' active'" href="/cashier/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'select-products'} ? ' active'" href="/cashier/select-products">Select Products</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'checkout'} ? ' active'" href="/cashier/checkout">Checkout</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'receipt'} ? ' active'" href="/cashier/receipt">Receipt</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div id="globalMsg" class="mb-3"></div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3"><i class="bi bi-search me-2"></i>Search Product</h5>
            <div class="input-group mb-3">
                <input id="searchQuery" type="text" class="form-control" placeholder="Search by product name or barcode">
                <button class="btn btn-primary" type="button" onclick="searchProducts()">
                    <i class="bi bi-search me-1"></i>Search
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-sm table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Barcode</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Qty</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody id="searchResultsBody">
                    <tr><td colspan="6" class="text-muted">No products yet. Use search above.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3"><i class="bi bi-upc-scan me-2"></i>Scan Barcode</h5>
            <div class="row g-2">
                <div class="col-md-7">
                    <input id="scanBarcode" type="text" class="form-control" placeholder="Enter barcode">
                </div>
                <div class="col-md-3">
                    <input id="scanQty" type="number" min="1" value="1" class="form-control">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-success" type="button" onclick="scanAndAdd()">
                        <i class="bi bi-plus-circle me-1"></i>Add
                    </button>
                </div>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <span class="text-muted">Cart items: <strong id="cartCount">0</strong></span>
                <a class="btn btn-primary" href="/cashier/checkout">
                    <i class="bi bi-arrow-right-circle me-1"></i>Proceed to Checkout
                </a>
            </div>
        </div>
    </div>
</main>

<script>
    let searchResults = [];

    function getCart() {
        try {
            return JSON.parse(localStorage.getItem("cashierCart") || "[]");
        } catch (_) {
            return [];
        }
    }

    function saveCart(cart) {
        localStorage.setItem("cashierCart", JSON.stringify(cart));
        document.getElementById("cartCount").textContent = String(cart.reduce((sum, item) => sum + item.quantity, 0));
    }

    function showGlobalMessage(message, ok = true) {
        const el = document.getElementById("globalMsg");
        el.innerHTML = `<div class="alert ${ok ? "alert-success" : "alert-danger"} mb-0">${message}</div>`;
    }

    function money(value) {
        const number = Number(value || 0);
        return "TSh " + number.toFixed(2);
    }

    async function parseResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
            return response.json();
        }
        return response.text();
    }

    function renderSearchResults() {
        const body = document.getElementById("searchResultsBody");
        if (!searchResults.length) {
            body.innerHTML = `<tr><td colspan="6" class="text-muted">No matching products.</td></tr>`;
            return;
        }

        body.innerHTML = searchResults.map((product, idx) => `
            <tr>
                <td>${product.name}</td>
                <td>${product.barcode}</td>
                <td>${money(product.sellingPrice)}</td>
                <td>${product.stockQuantity}</td>
                <td>
                    <input id="searchQty-${idx}" class="form-control form-control-sm qty-input" type="number" min="1" value="1">
                </td>
                <td>
                    <button class="btn btn-sm btn-primary" type="button" onclick="addSearchResultToCart(${idx})">Add</button>
                </td>
            </tr>
        `).join("");
    }

    async function searchProducts() {
        const query = document.getElementById("searchQuery").value.trim();
        if (!query) {
            searchResults = [];
            renderSearchResults();
            return;
        }

        try {
            const response = await fetch(`/api/pos/search?query=${encodeURIComponent(query)}`);
            const data = await parseResponse(response);
            if (!response.ok) {
                throw new Error(typeof data === "string" ? data : "Error while searching products");
            }
            searchResults = Array.isArray(data) ? data : [];
            renderSearchResults();
        } catch (error) {
            showGlobalMessage(error.message, false);
        }
    }

    function addSearchResultToCart(index) {
        const product = searchResults[index];
        if (!product) return;
        const qtyInput = document.getElementById(`searchQty-${index}`);
        const quantity = parseInt(qtyInput ? qtyInput.value : "1", 10);
        addToCart(product, quantity);
    }

    async function scanAndAdd() {
        const barcode = document.getElementById("scanBarcode").value.trim();
        const quantity = parseInt(document.getElementById("scanQty").value, 10);

        if (!barcode) {
            showGlobalMessage("Please enter barcode.", false);
            return;
        }
        if (!quantity || quantity < 1) {
            showGlobalMessage("Quantity must be at least 1.", false);
            return;
        }

        try {
            const response = await fetch("/api/pos/scan", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ barcode })
            });
            const data = await parseResponse(response);
            if (!response.ok) {
                throw new Error(typeof data === "string" ? data : "Unable to scan barcode.");
            }

            addToCart(data, quantity);
            document.getElementById("scanBarcode").value = "";
            document.getElementById("scanQty").value = "1";
        } catch (error) {
            showGlobalMessage(error.message, false);
        }
    }

    function addToCart(product, quantity) {
        if (!quantity || quantity < 1) {
            showGlobalMessage("Quantity must be at least 1.", false);
            return;
        }

        const stock = Number(product.stockQuantity || 0);
        if (quantity > stock) {
            showGlobalMessage(`Only ${stock} units available for ${product.name}.`, false);
            return;
        }

        const cart = getCart();
        const existingIndex = cart.findIndex(item => item.barcode === product.barcode);
        if (existingIndex >= 0) {
            const nextQty = cart[existingIndex].quantity + quantity;
            if (nextQty > stock) {
                showGlobalMessage(`Cannot add more than ${stock} units for ${product.name}.`, false);
                return;
            }
            cart[existingIndex].quantity = nextQty;
        } else {
            cart.push({
                barcode: product.barcode,
                name: product.name,
                unitPrice: Number(product.sellingPrice),
                stockQuantity: stock,
                quantity: quantity
            });
        }

        saveCart(cart);
        showGlobalMessage(`${product.name} added to cart.`);
    }

    document.getElementById("searchQuery").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();
            searchProducts();
        }
    });

    document.getElementById("scanBarcode").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();
            scanAndAdd();
        }
    });

    saveCart(getCart());
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
