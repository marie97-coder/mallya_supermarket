<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .home-topbar {
            background: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }

        .home-topbar-inner {
            max-width: 1100px;
            margin: auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .home-topbar-logo {
            background: #0d6efd;
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 700;
            text-decoration: none;
            line-height: 1;
        }

        .home-topbar-links a {
            margin-left: 16px;
            color: #6b6b6b;
            text-decoration: none;
            font-weight: 500;
        }

        .home-topbar-links a:hover {
            color: #1f1f1f;
        }
        body { background: #f4f6fa; }
        .nav-link.active {
            font-weight: 600;
            color: #fff !important;
            text-decoration: underline;
            text-underline-offset: 0.35rem;
        }
        .summary-value {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .payment-meta {
            font-size: 0.9rem;
            color: #4b5563;
        }
    </style>
</head>
<body>
<header class="home-topbar">
    <div class="home-topbar-inner">
        <a class="home-topbar-logo" href="/">MALLYA</a>
        <nav class="home-topbar-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </nav>
    </div>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-lg-4">
        <a class="navbar-brand fw-semibold" href="/cashier/dashboard">
            <i class="bi bi-cart-check me-2"></i>Cashier POS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#cashierNav" aria-controls="cashierNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="cashierNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'dashboard'} ? ' active'" href="/cashier/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'select-products'} ? ' active'" href="/cashier/select-products">Select Products</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'checkout'} ? ' active'" href="/cashier/checkout">Checkout</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'receipt'} ? ' active'" href="/cashier/receipt">Receipt</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div id="globalMsg" class="mb-3"></div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3"><i class="bi bi-bag-check me-2"></i>Checkout Cart</h5>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Item</th>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody id="cartBody">
                            <tr><td colspan="5" class="text-muted">Cart is empty.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3"><i class="bi bi-receipt-cutoff me-2"></i>Summary</h5>
                    <div class="border rounded p-3 bg-light">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span id="subtotalValue" class="summary-value">TSh 0.00</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <span class="fw-semibold">Total</span>
                            <span id="totalValue" class="summary-value text-primary">TSh 0.00</span>
                        </div>
                    </div>

                    <hr class="my-3">

                    <h6 class="mb-2"><i class="bi bi-wallet2 me-2"></i>Payment</h6>
                    <div class="mb-2">
                        <label for="paymentMethod" class="form-label small mb-1">Payment Method</label>
                        <select id="paymentMethod" class="form-select">
                            <option value="CASH">Cash</option>
                            <option value="MOBILE_MONEY">Mobile Money (M-Pesa/TigoPesa)</option>
                            <option value="AZAMPAY">AzamPay Mobile Money</option>
                            <option value="CARD">Bank Card</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label for="amountReceived" class="form-label small mb-1">Amount Received</label>
                        <input id="amountReceived" type="number" min="0" step="0.01" class="form-control" placeholder="0.00">
                    </div>
                    <div class="mb-2 d-none" id="azamProviderGroup">
                        <label for="azamProvider" class="form-label small mb-1">AzamPay Provider</label>
                        <select id="azamProvider" class="form-select">
                            <option value="">Select Provider</option>
                            <option value="mpesa">M-Pesa</option>
                            <option value="airtel">Airtel Money</option>
                            <option value="tigo">Tigo Pesa</option>
                            <option value="halopesa">HaloPesa</option>
                            <option value="azampesa">AzamPesa</option>
                            <option value="zantel">Zantel</option>
                        </select>
                    </div>
                    <div class="mb-2 d-none" id="azamPhoneGroup">
                        <label for="azamPhoneNumber" class="form-label small mb-1">Customer Mobile Number</label>
                        <input id="azamPhoneNumber" type="text" class="form-control" placeholder="e.g. 2557XXXXXXXX">
                    </div>
                    <div class="mb-2 d-none" id="transactionReferenceGroup">
                        <label for="transactionReference" class="form-label small mb-1">Transaction Reference ID</label>
                        <input id="transactionReference" type="text" class="form-control" placeholder="e.g. MPESA123ABC">
                    </div>
                    <div class="payment-meta mt-2">
                        Change: <strong id="changeValue">TSh 0.00</strong>
                    </div>

                    <button class="btn btn-lg btn-primary w-100 mt-3" type="button" onclick="completeSale()">
                        <i class="bi bi-check2-circle me-2"></i>Complete Sale
                    </button>
                    <a class="btn btn-outline-secondary w-100 mt-2" href="/cashier/select-products">
                        <i class="bi bi-arrow-left-circle me-1"></i>Back to Product Selection
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    const cashierUsername = /*[[${username}]]*/ 'cashier1';
    let cart = [];
    let runningTotal = 0;

    function getCart() {
        try {
            return JSON.parse(localStorage.getItem("cashierCart") || "[]");
        } catch (_) {
            return [];
        }
    }

    function saveCart(nextCart) {
        cart = nextCart;
        localStorage.setItem("cashierCart", JSON.stringify(cart));
    }

    function money(value) {
        const number = Number(value || 0);
        return "TSh " + number.toFixed(2);
    }

    function showGlobalMessage(message, ok = true) {
        const el = document.getElementById("globalMsg");
        el.innerHTML = `<div class="alert ${ok ? "alert-success" : "alert-danger"} mb-0">${message}</div>`;
    }

    async function parseResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
            return response.json();
        }
        return response.text();
    }

    function updateCartQuantity(index, delta) {
        const item = cart[index];
        if (!item) return;
        const nextQty = item.quantity + delta;
        if (nextQty < 1) return;
        if (nextQty > item.stockQuantity) {
            showGlobalMessage(`Cannot exceed stock (${item.stockQuantity}) for ${item.name}.`, false);
            return;
        }
        item.quantity = nextQty;
        saveCart(cart);
        renderCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        saveCart(cart);
        renderCart();
    }

    function renderCart() {
        const body = document.getElementById("cartBody");
        if (!cart.length) {
            body.innerHTML = `<tr><td colspan="5" class="text-muted">Cart is empty.</td></tr>`;
            updateTotals();
            return;
        }

        body.innerHTML = cart.map((item, idx) => {
            const lineTotal = item.unitPrice * item.quantity;
            return `
                <tr>
                    <td>${item.name}</td>
                    <td>${money(item.unitPrice)}</td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-secondary" type="button" onclick="updateCartQuantity(${idx}, -1)">-</button>
                            <button class="btn btn-outline-secondary" type="button" disabled>${item.quantity}</button>
                            <button class="btn btn-outline-secondary" type="button" onclick="updateCartQuantity(${idx}, 1)">+</button>
                        </div>
                    </td>
                    <td>${money(lineTotal)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" type="button" onclick="removeFromCart(${idx})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }).join("");

        updateTotals();
    }

    function updateTotals() {
        const subtotal = cart.reduce((sum, item) => sum + (item.unitPrice * item.quantity), 0);
        const total = subtotal;
        runningTotal = total;

        document.getElementById("subtotalValue").textContent = money(subtotal);
        document.getElementById("totalValue").textContent = money(total);
        updatePaymentDerivedValues();
    }

    function updatePaymentDerivedValues() {
        const paymentMethod = document.getElementById("paymentMethod").value;
        if (paymentMethod === "AZAMPAY") {
            document.getElementById("amountReceived").value = runningTotal.toFixed(2);
            document.getElementById("changeValue").textContent = money(0);
            return;
        }

        const amountReceived = Number(document.getElementById("amountReceived").value || 0);
        const change = amountReceived - runningTotal;
        document.getElementById("changeValue").textContent = money(change > 0 ? change : 0);
    }

    function updatePaymentFieldsVisibility() {
        const paymentMethod = document.getElementById("paymentMethod").value;
        const azamProviderGroup = document.getElementById("azamProviderGroup");
        const azamPhoneGroup = document.getElementById("azamPhoneGroup");
        const referenceGroup = document.getElementById("transactionReferenceGroup");

        if (paymentMethod === "AZAMPAY") {
            azamProviderGroup.classList.remove("d-none");
            azamPhoneGroup.classList.remove("d-none");
            referenceGroup.classList.add("d-none");
        } else if (paymentMethod === "CASH") {
            azamProviderGroup.classList.add("d-none");
            azamPhoneGroup.classList.add("d-none");
            referenceGroup.classList.add("d-none");
        } else {
            azamProviderGroup.classList.add("d-none");
            azamPhoneGroup.classList.add("d-none");
            referenceGroup.classList.remove("d-none");
        }

        updatePaymentDerivedValues();
    }

    function saveReceiptAndRedirect(receipt) {
        localStorage.setItem("cashierLastReceipt", JSON.stringify(receipt));
        localStorage.setItem("cashierAutoPrint", "true");
        localStorage.setItem("cashierCart", "[]");
        window.location.href = "/cashier/receipt";
    }

    function buildItemsPayload() {
        return cart.map(item => ({
            barcode: item.barcode,
            quantity: item.quantity
        }));
    }

    async function completeSaleByAzamPay() {
        const provider = document.getElementById("azamProvider").value;
        const accountNumber = document.getElementById("azamPhoneNumber").value.trim();

        if (!provider) {
            showGlobalMessage("Please select AzamPay provider.", false);
            return;
        }

        if (!accountNumber) {
            showGlobalMessage("Customer mobile number is required for AzamPay.", false);
            return;
        }

        const payload = {
            cashierUsername: cashierUsername,
            provider: provider,
            accountNumber: accountNumber,
            items: buildItemsPayload()
        };

        const response = await fetch("/api/payments/azampay/checkout-mno", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await parseResponse(response);
        if (!response.ok) {
            throw new Error(typeof data === "string" ? data : "AzamPay checkout failed.");
        }

        saveReceiptAndRedirect(data);
    }

    async function completeSale() {
        if (!cart.length) {
            showGlobalMessage("Cart is empty. Add products first.", false);
            return;
        }

        const paymentMethod = document.getElementById("paymentMethod").value;
        const amountReceived = paymentMethod === "AZAMPAY"
            ? runningTotal
            : Number(document.getElementById("amountReceived").value || 0);
        const transactionReference = document.getElementById("transactionReference").value.trim();

        if (!paymentMethod) {
            showGlobalMessage("Please select payment method.", false);
            return;
        }

        if (paymentMethod !== "AZAMPAY" && (!amountReceived || amountReceived <= 0)) {
            showGlobalMessage("Amount received is required.", false);
            return;
        }

        if (paymentMethod !== "AZAMPAY" && amountReceived < runningTotal) {
            showGlobalMessage("Amount received must be equal to or greater than total.", false);
            return;
        }

        if ((paymentMethod === "MOBILE_MONEY" || paymentMethod === "CARD") && !transactionReference) {
            showGlobalMessage("Transaction Reference ID is required for Mobile Money and Card.", false);
            return;
        }

        if (paymentMethod === "AZAMPAY") {
            try {
                await completeSaleByAzamPay();
            } catch (error) {
                showGlobalMessage(error.message, false);
            }
            return;
        }

        const payload = {
            cashierUsername: cashierUsername,
            paymentMethod: paymentMethod,
            amountReceived: amountReceived,
            transactionReference: transactionReference || null,
            items: buildItemsPayload()
        };

        try {
            const response = await fetch("/api/pos/sale", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await parseResponse(response);
            if (!response.ok) {
                throw new Error(typeof data === "string" ? data : "Sale could not be completed.");
            }

            saveReceiptAndRedirect(data);
        } catch (error) {
            showGlobalMessage(error.message, false);
        }
    }

    cart = getCart();
    document.getElementById("paymentMethod").addEventListener("change", updatePaymentFieldsVisibility);
    document.getElementById("amountReceived").addEventListener("input", updatePaymentDerivedValues);
    updatePaymentFieldsVisibility();
    renderCart();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
